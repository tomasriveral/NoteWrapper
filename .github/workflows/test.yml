name: test

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          make \
          pkg-config \
          libcjson-dev \
          libncurses-dev \
          git \
          neovim
    - name: Prepare environnement
      run: mkdir -p ~/Documents/Notes
    - name: Build
      run: make

    - name: Run tests
      run: |
        export TERM=xterm
        make test
